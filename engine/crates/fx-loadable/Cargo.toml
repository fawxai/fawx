[package]
name = "fx-loadable"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Fawx loadable layer — skill registry, plugin loading, built-in tool adapters. Hot-swappable at runtime."

[dependencies]
fx-core = { workspace = true }
fx-kernel = { workspace = true }
fx-llm = { path = "../fx-llm" }
fx-session = { workspace = true }
fx-skills = { path = "../fx-skills" }
fx-transactions = { path = "../fx-transactions" }

async-trait.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
toml.workspace = true
tokio = { workspace = true, features = ["sync", "time"] }
tracing.workspace = true
dirs = "6.0"
futures.workspace = true
notify = { version = "7", features = ["macos_fsevent"] }
sha2 = "0.10"

[dev-dependencies]
tempfile = "3"
tokio.workspace = true
zeroize.workspace = true
