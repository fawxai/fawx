[package]
name = "fx-python"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["process", "time", "fs", "io-util", "rt"] }
libc = "0.2"
fx-kernel = { path = "../fx-kernel" }
fx-loadable = { path = "../fx-loadable" }
fx-llm = { path = "../fx-llm" }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
