[package]
name = "fx-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "fawx"
path = "src/main.rs"

[dependencies]
fx-core.workspace = true
fx-kernel.workspace = true
fx-llm = { path = "../fx-llm" }
fx-security.workspace = true
fx-skills = { path = "../fx-skills" }
fx-storage.workspace = true
ring.workspace = true
clap.workspace = true
tokio.workspace = true
async-trait.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
crossterm.workspace = true
futures.workspace = true
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
reqwest.workspace = true
axum = "0.8"
uuid = { version = "1.13", features = ["v4"] }
rand = "0.8"
sha2 = "0.10"
base64 = "0.22"
dirs = "6.0"
chrono = "0.4"
# rustyline: readline with history, completion, and key bindings. Rolling our own
# would be 1000+ lines for equivalent quality. Audited dependency: pure Rust,
# no unsafe, actively maintained.
rustyline = "15"
subtle = "2.6"
urlencoding = "2.1"
# termimad: markdown rendering for terminal output.
# Forked to abbudjoe/termimad for supply-chain safety. MIT licensed.
termimad = { git = "https://github.com/abbudjoe/termimad.git", rev = "f93824f3010e8f7b2650973a2723dd6d36a2f0db" }

# syntect: syntax highlighting for code blocks.
# Forked to abbudjoe/syntect for supply-chain safety. MIT licensed.
syntect = { git = "https://github.com/abbudjoe/syntect.git", rev = "6271d7dd8a63f13df08c151840f2358bf116cdcc", default-features = false, features = ["default-fancy"] }

[dev-dependencies]
tempfile = "3.14"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
hyper = "1.0"
