# Top-level fields are the current engine contract for WASM skill manifests.
name = "weather"
version = "1.0.0"
description = "Get current weather and forecasts for any location"
author = "Fawx Team"
api_version = "host_api_v1"
capabilities = ["network"]
entry_point = "run"

[[tools]]
name = "weather"
description = "Get current weather and a short forecast for a specific location"
direct_utility = true
trigger_patterns = ["weather", "forecast"]

[[tools.parameters]]
name = "location"
type = "string"
description = "City or location to check weather for"
required = true

[[tools.parameters]]
name = "units"
type = "string"
description = "Optional units override: fahrenheit or celsius"
required = false
