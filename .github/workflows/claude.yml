name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Download the action so we can patch it before running
      - name: Download Claude Code Action
        uses: actions/checkout@v4
        with:
          repository: anthropics/claude-code-action
          ref: v1.0.51
          path: .claude-action

      - name: Install Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version: 1.3.6

      # Workaround: pin claude-agent-sdk to 0.2.42 to avoid AJV schema crash
      # See: https://github.com/anthropics/claude-code-action/issues/947
      - name: Install dependencies (with pinned SDK)
        run: |
          cd .claude-action
          sed -i 's/"@anthropic-ai\/claude-agent-sdk": "\^0.2.42"/"@anthropic-ai\/claude-agent-sdk": "0.2.42"/' package.json
          rm -f bun.lock bun.lockb
          bun install --production

      - name: Run Claude Code Action
        id: claude
        shell: bash
        run: bun run .claude-action/src/entrypoints/run.ts
        env:
          TRIGGER_PHRASE: "@claude"
          OVERRIDE_GITHUB_TOKEN: ""
          GITHUB_RUN_ID: ${{ github.run_id }}
          USE_STICKY_COMMENT: "false"
          DEFAULT_WORKFLOW_TOKEN: ${{ github.token }}
          USE_COMMIT_SIGNING: "false"
          BOT_ID: "41898282"
          BOT_NAME: "claude[bot]"
          TRACK_PROGRESS: "false"
          INCLUDE_FIX_LINKS: "true"
          ADDITIONAL_PERMISSIONS: "actions: read"
          CLAUDE_ARGS: ""
          ALL_INPUTS: '{"trigger_phrase":"@claude","use_sticky_comment":"false","use_commit_signing":"false","bot_id":"41898282","bot_name":"claude[bot]","track_progress":"false","include_fix_links":"true","additional_permissions":"actions: read"}'
          INPUT_PROMPT_FILE: ${{ runner.temp }}/claude-prompts/claude-prompt.txt
          INPUT_SETTINGS: ""
          INPUT_EXPERIMENTAL_SLASH_COMMANDS_DIR: .claude-action/slash-commands
          INPUT_PATH_TO_CLAUDE_CODE_EXECUTABLE: ""
          INPUT_PATH_TO_BUN_EXECUTABLE: ""
          INPUT_SHOW_FULL_OUTPUT: "false"
          INPUT_PLUGINS: ""
          INPUT_PLUGIN_MARKETPLACES: ""
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Revoke app token
        if: always()
        shell: bash
        run: |
          TOKEN="${{ steps.claude.outputs.github_token }}"
          if [ -n "$TOKEN" ]; then
            curl -sL -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              ${GITHUB_API_URL:-https://api.github.com}/installation/token
          fi
