name: Android Atomic Nightly

on:
  # GitHub schedule triggers execute from the repository default branch only.
  # Use workflow_dispatch to validate nightly behavior on non-default branches (for example, staging).
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  p1-nightly:
    name: P1 broader regression (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: P1 core unit regression
        run: ./scripts/test-atomic.sh p1.core-unit

      - name: P1 chat unit regression
        if: ${{ always() }}
        run: ./scripts/test-atomic.sh p1.chat-unit

  p2-nightly:
    name: P2 soak/flaky detection (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: P2 soak sensor repeat
        run: ./scripts/test-atomic.sh p2.soak-sensor-repeat --iterations 5

      - name: P2 flaky audit
        if: ${{ always() }}
        run: ./scripts/test-atomic.sh p2.flaky-audit
