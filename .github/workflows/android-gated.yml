name: Android Gated

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
  push:
    branches: [main, staging]

concurrency:
  group: android-gated-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (P0 blocking, P1 observational)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request_review' &&
        github.event.review.state == 'approved' &&
        contains(fromJson('["main","staging","feat/android-mvp"]'), github.event.pull_request.base.ref)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: "P0 bucket: chat lint (blocking)"
        run: ./scripts/test-atomic.sh p0.chat-lint

      - name: "P0 bucket: core sensor CI (blocking)"
        run: ./scripts/test-atomic.sh p0.core-sensor-ci

      - name: "P0 bucket: chat sensor CI (blocking)"
        run: ./scripts/test-atomic.sh p0.chat-sensor-ci

      - name: "P1 bucket: core unit (observational)"
        continue-on-error: true
        run: ./scripts/test-atomic.sh p1.core-unit

      - name: "P1 bucket: chat unit (observational)"
        continue-on-error: true
        run: ./scripts/test-atomic.sh p1.chat-unit
