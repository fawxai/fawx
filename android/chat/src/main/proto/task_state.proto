syntax = "proto3";

option java_package = "ai.citros.chat.proto";
option java_multiple_files = true;

package ai.citros.chat.proto;

message TaskStateProto {

  string task_id = 1;
  string user_message = 2;
  repeated string conversation_messages_json = 3;
  int32 current_step = 4;
  int32 max_steps = 5;
  int64 started_at_ms = 6;
  int64 last_checkpoint_ms = 7;
  repeated PendingToolCall pending_tool_calls = 8;
  TaskStatus status = 9;
  bool subtask_in_progress = 10;
  string subtask_goal = 11;
  int32 subtask_depth = 12;

  // Reserve a small buffer for additive fields as persistence evolves.
  reserved 100 to 119;

  message PendingToolCall {
    string id = 1;
    string name = 2;
    string input_json = 3;
  }

  enum TaskStatus {
    TASK_STATUS_UNSPECIFIED = 0;
    ACTIVE = 1;
    INTERRUPTED = 2;
    COMPLETED = 3;
    FAILED = 4;
  }
}
