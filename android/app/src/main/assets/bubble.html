<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Citros Bubble</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: transparent;
  -webkit-user-select: none; user-select: none;
}
#canvas-wrap { width: 100%; height: 100%; position: relative; }
canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<script src="three.min.js"></script>
<script>
(function () {
  'use strict';

  var FLAVORS = {
    lime: {
      label: 'Lime',
      color: [0.48, 0.75, 0.26],
      emissive: [0.25, 0.55, 0.12],
      glow: [0.35, 0.85, 0.18],
      dot: '#7bc043',
      peel: { count: 4500, minR: 1.5, maxR: 3.5, depth: 92, bumpScale: 0.12, noise: 16 }
    },
    tangerine: {
      label: 'Tangerine',
      color: [0.95, 0.55, 0.1],
      emissive: [0.85, 0.38, 0.04],
      glow: [1.0, 0.6, 0.1],
      dot: '#ff8c00',
      peel: { count: 3500, minR: 2, maxR: 4.5, depth: 95, bumpScale: 0.10, noise: 12 }
    },
    lemon: {
      label: 'Lemon',
      color: [0.97, 0.87, 0.22],
      emissive: [0.85, 0.72, 0.08],
      glow: [1.0, 0.92, 0.3],
      dot: '#ffd700',
      peel: { count: 4000, minR: 1.5, maxR: 4, depth: 90, bumpScale: 0.13, noise: 14 }
    },
    bloodOrange: {
      label: 'Blood Orange',
      color: [0.82, 0.18, 0.05],
      emissive: [0.72, 0.1, 0.02],
      glow: [0.95, 0.15, 0.05],
      dot: '#cc3300',
      peel: { count: 3800, minR: 2, maxR: 4.5, depth: 85, bumpScale: 0.11, noise: 14 }
    },
    grapefruit: {
      label: 'Grapefruit',
      color: [0.96, 0.45, 0.4],
      emissive: [0.82, 0.32, 0.28],
      glow: [1.0, 0.5, 0.42],
      dot: '#ff6b6b',
      peel: { count: 3000, minR: 2.5, maxR: 5.5, depth: 88, bumpScale: 0.14, noise: 16 }
    }
  };

  var STATES = {
    idle: {
      label: 'Idle',
      emissiveI: 0.12, rotSpd: 0.002, tScale: 1.0,
      iLight: 0.4, breatheA: 0, breatheS: 0,
      wobbleA: 0, wobbleS: 0, shakeA: 0, shakeS: 0,
      desat: 0, amber: 0, errWhite: 0, glowA: 0.12, haloS: 3.8
    },
    listening: {
      label: 'Listening',
      emissiveI: 0.45, rotSpd: 0.0, tScale: 1.05,
      iLight: 1.8, breatheA: 0, breatheS: 0,
      wobbleA: 0, wobbleS: 0, shakeA: 0, shakeS: 0,
      desat: 0, amber: 0, errWhite: 0, glowA: 0.22, haloS: 4.5
    },
    thinking: {
      label: 'Thinking',
      emissiveI: 0.35, rotSpd: 0.012, tScale: 1.0,
      iLight: 1.3, breatheA: 0.03, breatheS: 0.8,
      wobbleA: 0, wobbleS: 0, shakeA: 0, shakeS: 0,
      desat: 0, amber: 0, errWhite: 0, glowA: 0.18, haloS: 4.2
    },
    speaking: {
      label: 'Speaking',
      emissiveI: 0.65, rotSpd: 0.004, tScale: 1.02,
      iLight: 2.8, breatheA: 0, breatheS: 0,
      wobbleA: 0.025, wobbleS: 2.8, shakeA: 0, shakeS: 0,
      desat: 0, amber: 0, errWhite: 0, glowA: 0.3, haloS: 5.0
    },
    attention: {
      label: 'Attention',
      emissiveI: 0.5, rotSpd: 0.003, tScale: 1.0,
      iLight: 2.0, breatheA: 0, breatheS: 0,
      wobbleA: 0, wobbleS: 0, shakeA: 0.035, shakeS: 18,
      desat: 0, amber: 0, errWhite: 0, glowA: 0.25, haloS: 4.4
    },
    error: {
      label: 'Error',
      emissiveI: 0.06, rotSpd: 0.001, tScale: 0.94,
      iLight: 0.15, breatheA: 0.018, breatheS: 0.7,
      wobbleA: 0.04, wobbleS: 1.2, shakeA: 0, shakeS: 0,
      desat: 0.75, amber: 0, errWhite: 0.55, glowA: 0.05, haloS: 3.2
    }
  };

  var currentFlavor = 'tangerine';
  var currentStateName = 'idle';
  var anim = {};
  var stateKeys = Object.keys(STATES.idle);
  stateKeys.forEach(function (k) {
    if (typeof STATES.idle[k] === 'number') anim[k] = STATES.idle[k];
  });

  var rotAngle = 0, breathePhase = 0;
  var wobblePA = 0, wobblePB = 0, shakePhase = 0;
  var mouseNX = 0, mouseNY = 0, smX = 0, smY = 0;
  var transitionTime = 0;

  /* Procedural textures */
  function makeBumpCanvas(p) {
    var W = 1024, H = 512;
    var c = document.createElement('canvas');
    c.width = W; c.height = H;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#808080';
    ctx.fillRect(0, 0, W, H);
    for (var i = 0; i < p.count; i++) {
      var x = Math.random() * W;
      var y = Math.random() * H;
      var r = p.minR + Math.random() * (p.maxR - p.minR);
      var v = p.depth + Math.floor(Math.random() * 18);
      var grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, 'rgb(' + v + ',' + v + ',' + v + ')');
      grad.addColorStop(0.7, 'rgb(' + (v+10) + ',' + (v+10) + ',' + (v+10) + ')');
      grad.addColorStop(1, 'rgba(128,128,128,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
    var imgData = ctx.getImageData(0, 0, W, H);
    var d = imgData.data;
    for (var j = 0; j < d.length; j += 4) {
      var n = (Math.random() - 0.5) * p.noise;
      d[j]   = Math.max(0, Math.min(255, d[j] + n));
      d[j+1] = Math.max(0, Math.min(255, d[j+1] + n));
      d[j+2] = Math.max(0, Math.min(255, d[j+2] + n));
    }
    ctx.putImageData(imgData, 0, 0);
    for (var k = 0; k < 15; k++) {
      var px = Math.random() * W, py = Math.random() * H;
      var pr = 30 + Math.random() * 80;
      var br = 128 + (Math.random() - 0.5) * 20;
      var g2 = ctx.createRadialGradient(px, py, 0, px, py, pr);
      g2.addColorStop(0, 'rgba(' + Math.floor(br) + ',' + Math.floor(br) + ',' + Math.floor(br) + ',0.15)');
      g2.addColorStop(1, 'rgba(128,128,128,0)');
      ctx.fillStyle = g2;
      ctx.fillRect(px - pr, py - pr, pr * 2, pr * 2);
    }
    return c;
  }

  function makeGlowCanvas(rgb) {
    var size = 256;
    var c = document.createElement('canvas');
    c.width = c.height = size;
    var ctx = c.getContext('2d');
    var h = size / 2;
    var r = Math.floor(rgb[0]*255), g = Math.floor(rgb[1]*255), b = Math.floor(rgb[2]*255);
    var grad = ctx.createRadialGradient(h, h, 0, h, h, h);
    grad.addColorStop(0,   'rgba('+r+','+g+','+b+',0.5)');
    grad.addColorStop(0.15,'rgba('+r+','+g+','+b+',0.3)');
    grad.addColorStop(0.4, 'rgba('+r+','+g+','+b+',0.08)');
    grad.addColorStop(0.7, 'rgba('+r+','+g+','+b+',0.02)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
    return c;
  }

  var bumpTextures = {}, glowCanvases = {};
  Object.keys(FLAVORS).forEach(function (key) {
    var f = FLAVORS[key];
    var tex = new THREE.CanvasTexture(makeBumpCanvas(f.peel));
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    bumpTextures[key] = tex;
    glowCanvases[key] = makeGlowCanvas(f.glow);
  });

  /* THREE.JS SCENE — transparent background */
  var container = document.getElementById('canvas-wrap');
  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  container.appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  /* No scene.background — transparent */

  var camera = new THREE.PerspectiveCamera(40,
    container.clientWidth / container.clientHeight, 0.1, 100);
  camera.position.set(0, 0.2, 5.5);
  camera.lookAt(0, 0, 0);

  /* Lighting */
  scene.add(new THREE.AmbientLight(0x222222, 0.4));

  var keyLight = new THREE.DirectionalLight(0xffffff, 0.25);
  keyLight.position.set(4, 4, 5);
  scene.add(keyLight);

  var fillLight = new THREE.DirectionalLight(0x8888aa, 0.08);
  fillLight.position.set(-3, 1, 3);
  scene.add(fillLight);

  var rimLight = new THREE.DirectionalLight(0xffffff, 0.15);
  rimLight.position.set(0, -1, -4);
  scene.add(rimLight);

  var innerLight = new THREE.PointLight(0xffffff, 0.5, 6, 2);
  innerLight.position.set(0, 0, 0);
  scene.add(innerLight);

  /* Fruit group */
  var fruitGroup = new THREE.Group();
  scene.add(fruitGroup);

  var FR = 1.3;
  var initF = FLAVORS[currentFlavor];

  var fruitMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(initF.color[0], initF.color[1], initF.color[2]),
    emissive: new THREE.Color(initF.emissive[0], initF.emissive[1], initF.emissive[2]),
    emissiveIntensity: 0.12,
    roughness: 0.62,
    metalness: 0.03,
    bumpMap: bumpTextures[currentFlavor],
    bumpScale: initF.peel.bumpScale
  });

  var fruitMesh = new THREE.Mesh(
    new THREE.SphereGeometry(FR, 128, 64), fruitMat);
  fruitMesh.scale.set(1, 0.96, 1);
  fruitGroup.add(fruitMesh);

  /* Fresnel glow shell */
  var fresnelMat = new THREE.ShaderMaterial({
    uniforms: {
      glowColor: { value: new THREE.Color(initF.glow[0], initF.glow[1], initF.glow[2]) },
      intensity: { value: 0.5 },
      falloff:   { value: 2.8 }
    },
    vertexShader: [
      'varying vec3 vNormal;',
      'varying vec3 vViewPos;',
      'void main() {',
      '  vNormal = normalize(normalMatrix * normal);',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  vViewPos = mv.xyz;',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 glowColor;',
      'uniform float intensity;',
      'uniform float falloff;',
      'varying vec3 vNormal;',
      'varying vec3 vViewPos;',
      'void main() {',
      '  vec3 vd = normalize(-vViewPos);',
      '  float rim = 1.0 - max(0.0, dot(vNormal, vd));',
      '  float g = pow(rim, falloff) * intensity;',
      '  gl_FragColor = vec4(glowColor * g, g * 0.8);',
      '}'
    ].join('\n'),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.FrontSide
  });

  var fresnelGlow = new THREE.Mesh(
    new THREE.SphereGeometry(FR * 1.04, 64, 32), fresnelMat);
  fresnelGlow.scale.set(1, 0.96, 1);
  fruitGroup.add(fresnelGlow);

  /* Glow halo sprites */
  var haloTex = new THREE.CanvasTexture(glowCanvases[currentFlavor]);

  var haloMat = new THREE.SpriteMaterial({
    map: haloTex, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.12
  });
  var haloSprite = new THREE.Sprite(haloMat);
  haloSprite.scale.set(3.8, 3.8, 1);
  scene.add(haloSprite);

  var halo2Mat = new THREE.SpriteMaterial({
    map: haloTex, transparent: true,
    blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.05
  });
  var halo2Sprite = new THREE.Sprite(halo2Mat);
  halo2Sprite.scale.set(6, 6, 1);
  scene.add(halo2Sprite);

  /* No ground shadow for the floating bubble overlay */

  var clock = new THREE.Clock();

  /* Flavor & state switching — callable from Android via JS interface */
  window.setFlavor = function(key) {
    if (!FLAVORS[key]) return;
    currentFlavor = key;
    var f = FLAVORS[key];
    fruitMat.color.setRGB(f.color[0], f.color[1], f.color[2]);
    fruitMat.emissive.setRGB(f.emissive[0], f.emissive[1], f.emissive[2]);
    fruitMat.bumpMap = bumpTextures[key];
    fruitMat.bumpScale = f.peel.bumpScale;
    fruitMat.needsUpdate = true;
    fresnelMat.uniforms.glowColor.value.setRGB(f.glow[0], f.glow[1], f.glow[2]);
    innerLight.color.setRGB(f.glow[0], f.glow[1], f.glow[2]);
    rimLight.color.setRGB(f.glow[0], f.glow[1], f.glow[2]);
    haloTex.image = glowCanvases[key];
    haloTex.needsUpdate = true;
  };

  window.setState = function(key) {
    if (!STATES[key]) return;
    currentStateName = key;
    transitionTime = clock.getElapsedTime();
    if (key === 'attention') shakePhase = 0;
  };

  /* Helpers */
  var _amber = new THREE.Color(1.0, 0.7, 0.15);
  var _white = new THREE.Color(0.9, 0.9, 0.95);
  var _tmp = new THREE.Color();
  var _tmp2 = new THREE.Color();

  /* Animation loop */
  function animate() {
    requestAnimationFrame(animate);
    // setInterval fallback fires below in case rAF is paused by overlay

    var dt = Math.min(clock.getDelta(), 0.05);
    var elapsed = clock.getElapsedTime();
    var target = STATES[currentStateName];
    var lf = 1 - Math.pow(1 - 0.045, dt * 60);

    for (var i = 0; i < stateKeys.length; i++) {
      var k = stateKeys[i];
      if (typeof anim[k] === 'number' && target[k] !== undefined) {
        anim[k] += (target[k] - anim[k]) * lf;
      }
    }

    smX += (mouseNX - smX) * 0.02;
    smY += (mouseNY - smY) * 0.02;

    rotAngle += anim.rotSpd;

    if (anim.breatheA > 0.0005) breathePhase += anim.breatheS * dt * Math.PI * 2;
    var breatheScale = 1 + Math.sin(breathePhase) * anim.breatheA;

    if (anim.wobbleA > 0.0005) {
      wobblePA += anim.wobbleS * dt * Math.PI * 2;
      wobblePB += anim.wobbleS * 0.73 * dt * Math.PI * 2;
    }
    var wobRotZ = Math.sin(wobblePA) * anim.wobbleA;
    var wobRotX = Math.sin(wobblePB) * anim.wobbleA * 0.6;

    var shakeX = 0;
    if (anim.shakeA > 0.0005) {
      shakePhase += anim.shakeS * dt * Math.PI * 2;
      shakeX = Math.sin(shakePhase) * anim.shakeA
             + Math.sin(shakePhase * 2.3) * anim.shakeA * 0.3;
    }

    var floatY = Math.sin(elapsed * 0.8) * 0.04;

    var tSince = elapsed - transitionTime;
    var settle = Math.exp(-tSince * 5) * Math.sin(tSince * 10) * 0.025;

    var totalScale = anim.tScale * breatheScale;
    fruitGroup.scale.setScalar(totalScale);
    fruitGroup.position.set(
      shakeX + smX * 0.08,
      floatY + settle + smY * -0.05,
      0
    );

    fruitMesh.rotation.y = rotAngle;
    fruitMesh.rotation.z = wobRotZ + smX * 0.03;
    fruitMesh.rotation.x = wobRotX + Math.sin(elapsed * 0.3) * 0.06 + smY * -0.06;
    fresnelGlow.rotation.copy(fruitMesh.rotation);

    var flav = FLAVORS[currentFlavor];
    _tmp.setRGB(flav.emissive[0], flav.emissive[1], flav.emissive[2]);
    if (anim.amber > 0.01) _tmp.lerp(_amber, anim.amber);
    if (anim.desat > 0.01) {
      var gray = (_tmp.r + _tmp.g + _tmp.b) / 3;
      _tmp2.setRGB(gray, gray, gray);
      _tmp.lerp(_tmp2, anim.desat);
    }
    if (anim.errWhite > 0.01) _tmp.lerp(_white, anim.errWhite);
    fruitMat.emissive.copy(_tmp);
    fruitMat.emissiveIntensity = anim.emissiveI;

    _tmp.setRGB(flav.color[0], flav.color[1], flav.color[2]);
    if (anim.desat > 0.01) {
      var g2 = (_tmp.r + _tmp.g + _tmp.b) / 3;
      _tmp2.setRGB(g2, g2, g2);
      _tmp.lerp(_tmp2, anim.desat * 0.5);
    }
    fruitMat.color.copy(_tmp);

    innerLight.intensity = anim.iLight;
    _tmp.setRGB(flav.glow[0], flav.glow[1], flav.glow[2]);
    if (anim.amber > 0.01) _tmp.lerp(_amber, anim.amber);
    if (anim.desat > 0.01) {
      var g3 = (_tmp.r + _tmp.g + _tmp.b) / 3;
      _tmp2.setRGB(g3, g3, g3);
      _tmp.lerp(_tmp2, anim.desat * 0.6);
    }
    if (anim.errWhite > 0.01) _tmp.lerp(_white, anim.errWhite);
    innerLight.color.copy(_tmp);

    fresnelMat.uniforms.intensity.value = anim.emissiveI * 1.5 + 0.1;
    fresnelMat.uniforms.glowColor.value.copy(innerLight.color);

    if (currentStateName === 'thinking') {
      var pulse = (Math.sin(breathePhase) + 1) / 2;
      fruitMat.emissiveIntensity = 0.22 + pulse * 0.18;
      fresnelMat.uniforms.intensity.value = 0.35 + pulse * 0.4;
      haloMat.opacity = 0.12 + pulse * 0.08;
      innerLight.intensity = 0.9 + pulse * 0.6;
    } else {
      haloMat.opacity = anim.glowA;
    }

    var hs = anim.haloS;
    haloSprite.scale.set(hs, hs, 1);
    halo2Mat.opacity = anim.glowA * 0.3;
    halo2Sprite.scale.set(hs * 1.6, hs * 1.6, 1);

    renderer.render(scene, camera);
  }

  /* Resize handler */
  window.addEventListener('resize', function () {
    var w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
  // Fallback: if requestAnimationFrame is throttled/paused in overlay,
  // this ensures the render loop still ticks at ~30fps
  setInterval(function() { renderer.render(scene, camera); }, 33);
})();
</script>
</body>
</html>
