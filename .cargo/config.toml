# Cargo configuration for Fawx

[build]
# Default to native target
# target = "x86_64-unknown-linux-gnu"  # Uncomment for explicit target

[profile.release]
# Optimize for size and performance
lto = true              # Link-time optimization
strip = true            # Strip symbols
codegen-units = 1       # Better optimization
opt-level = 3           # Maximum optimization

[profile.dev]
# Faster incremental builds in development
opt-level = 0
debug = true

# Android cross-compilation target (for Horizon 1)
# API Level 33 = Android 13 (minimum supported version)
[target.aarch64-linux-android]
linker = "aarch64-linux-android33-clang"
ar = "llvm-ar"

# iOS target (for future Horizon 2+)
# Cargo uses correct linker by default; no override needed
# [target.aarch64-apple-ios]
