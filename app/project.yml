# Canonical app build definition. Regenerate Fawx.xcodeproj with xcodegen after edits.
name: Fawx
options:
  minimumXcodeGenVersion: 2.45.3
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: NO
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: 2.4.1
targets:
  Fawx-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Fawx
        excludes:
          - Info.plist
          - Info-iOS.plist
          - LaunchScreen.storyboard
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_NAME: Fawx
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.mac
        INFOPLIST_FILE: Fawx/Info.plist
        CODE_SIGN_ENTITLEMENTS: Fawx/Fawx-macOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  Fawx-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Fawx
        excludes:
          - Info.plist
          - Info-iOS.plist
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_NAME: Fawx
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.ios
        INFOPLIST_FILE: Fawx/Info-iOS.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  FawxUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FawxUITests
    dependencies:
      - target: Fawx-iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.iosUITests
        TEST_TARGET_NAME: Fawx-iOS
  FawxTests-macOS:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FawxTests
    dependencies:
      - target: Fawx-macOS
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.macTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Fawx.app/Contents/MacOS/Fawx"
  FawxTests-iOS:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FawxTests
    dependencies:
      - target: Fawx-iOS
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.iosTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Fawx.app/Fawx"
        TEST_TARGET_NAME: Fawx-iOS
schemes:
  Fawx-macOS:
    build:
      targets:
        Fawx-macOS: all
    test:
      config: Debug
      targets:
        - FawxTests-macOS
    run:
      config: Debug
  Fawx-iOS:
    build:
      targets:
        Fawx-iOS: all
    test:
      config: Debug
      targets:
        - FawxTests-iOS
        - FawxUITests
    run:
      config: Debug
