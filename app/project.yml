name: Fawx
options:
  minimumXcodeGenVersion: 2.45.3
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: NO
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: 2.4.1
targets:
  Fawx-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Fawx
        excludes:
          - Info.plist
          - LaunchScreen.storyboard
    info:
      path: Fawx/Info.plist
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_NAME: Fawx
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.mac
        INFOPLIST_FILE: Fawx/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  Fawx-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Fawx
        excludes:
          - Info.plist
    info:
      path: Fawx/Info.plist
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_NAME: Fawx
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.ios
        INFOPLIST_FILE: Fawx/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  FawxUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FawxUITests
    dependencies:
      - target: Fawx-iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: ai.fawx.app.iosUITests
        TEST_TARGET_NAME: Fawx-iOS
schemes:
  Fawx-macOS:
    build:
      targets:
        Fawx-macOS: all
    run:
      config: Debug
  Fawx-iOS:
    build:
      targets:
        Fawx-iOS: all
    test:
      config: Debug
      targets:
        - FawxUITests
    run:
      config: Debug
