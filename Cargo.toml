[workspace]
members = [
    "crates/nv-core",
    "crates/nv-agent",
    "crates/nv-llm",
    "crates/nv-phone",
    "crates/nv-phone-sim",
    "crates/nv-voice",
    "crates/nv-security",
    "crates/nv-skills",
    "crates/nv-sync",
    "crates/nv-storage",
    "crates/nv-sensors",
    "crates/nv-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Joe"]
license = "MIT"

[workspace.dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Async runtime
tokio = { version = "1.41", features = ["full"] }

# CLI
clap = { version = "4.5", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Policy
toml = "0.8"
ring = "0.17"

# Shared crates
nv-core = { path = "crates/nv-core" }
