[workspace]
members = [
    "crates/ct-core",
    "crates/ct-agent",
    "crates/ct-llm",
    "crates/ct-security",
    "crates/ct-skills",
    "crates/ct-storage",
    "crates/ct-cli",
    "ffi/llama-cpp-sys",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Joe"]
license = "MIT"

[workspace.dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Async runtime
tokio = { version = "1.41", features = ["full"] }
async-trait = "0.1"

# CLI
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.27"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Policy
toml = "0.8"
ring = "0.17"

# Version management
semver = "1.0"

# Storage
redb = "2.4"
zeroize = "1.8"

# WASM runtime
wasmtime = "40.0.3"

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
futures = "0.3"

# Shared crates
ct-core = { path = "crates/ct-core" }
ct-agent = { path = "crates/ct-agent" }
ct-security = { path = "crates/ct-security" }
ct-skills = { path = "crates/ct-skills" }
ct-storage = { path = "crates/ct-storage" }
